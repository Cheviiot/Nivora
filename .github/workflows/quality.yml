name: Проверка Nivora

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  STPLR_UTILS_COMMIT: c6ddbb5e4e5637d97bb7b2587729178d715c6c52

jobs:
  quality:
    name: Статика, metadata и тесты
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    steps:
      - name: Получить репозиторий
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Установить Go
        uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5
        with:
          go-version: 1.26.5
          cache: false

      - name: Установить инструменты
        run: |
          sudo apt-get update
          sudo apt-get install -y jq rpm shellcheck
          git clone --filter=blob:none https://altlinux.space/stapler/stplr-utils.git "$RUNNER_TEMP/stplr-utils"
          git -C "$RUNNER_TEMP/stplr-utils" checkout "$STPLR_UTILS_COMMIT"
          (cd "$RUNNER_TEMP/stplr-utils" && GOBIN="$RUNNER_TEMP/bin" go install ./cmd/stplr-spec)
          echo "$RUNNER_TEMP/bin" >>"$GITHUB_PATH"

      - name: Выполнить проверки
        run: tools/run_checks.sh

      - name: Сверить upstream-версии
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: tools/package_updates.sh check-all
